profile: enterprise
description: "Full enterprise governance for multi-team, multi-domain, formal ARB programmes"
applies_to:
  project_types: [enterprise-platform, agent-platform]
  domains: [insurance, banking, healthcare, retail, generic]

mandatory_reviews:
  - review: architecture-review
    agent: architect
    timing: before_implementation
    blocking: true
    
  - review: arb-gate
    agent: arb-reviewer
    timing: before_implementation
    blocking: true
    note: "ADR required for every major decision"
    
  - review: security-review
    agent: security-auditor
    timing: before_staging_deploy
    blocking: true
    
  - review: ai-governance-review
    agent: ai-governance-officer
    timing: before_staging_deploy
    condition: "ai.enabled == true"
    blocking: true
    
  - review: compliance-review
    agent: compliance-reviewer
    timing: before_production_deploy
    blocking: true
    
  - review: production-readiness-review
    agent: production-readiness-reviewer
    timing: before_production_deploy
    blocking: true

generated_artifacts:
  - artifact: CLAUDE.md
    template: "governance-generator/templates/claude-md-enterprise.md"
  - artifact: docs/architecture/solution-architecture.md
    template: "capability-packs/architecture/templates/solution-architecture.md.template"
  - artifact: docs/architecture/capability-map.md
    note: "Generated by enterprise-architect agent"
  - artifact: docs/decisions/ADR-0001-architecture-style.md
    template: "capability-packs/architecture/templates/adr-template.md"
  - artifact: docs/risk-register.md
    template: "capability-packs/governance/templates/risk-register.md.template"
  - artifact: docs/review-checklist.md
    template: "capability-packs/governance/templates/review-checklist.md.template"
  - artifact: docs/compliance/
    note: "Full compliance folder with all framework mappings"
  - artifact: docs/arb-submission/
    note: "ARB gate submission package"
  - artifact: .github/copilot-instructions.md
    template: "governance-generator/templates/copilot-enterprise.md"
  - artifact: docs/slo-definitions.md
    note: "SLO specification with targets and alerting thresholds"

cicd_gates:
  build: true
  test: true
  coverage_minimum: 85
  security_scan: true
  sast: true
  dast: true                 # Dynamic Application Security Testing (staging)
  dependency_scan: true
  container_scan: true
  infrastructure_scan: true  # CDK security scan (cdk-nag)
  deploy_approval:
    dev: false
    staging: true            # 1 approval
    prod: true               # 2 approvals + CAB approval

slo_required: true
slo_templates:
  - "Availability: 99.95%"
  - "p99 latency: < 500ms"
  - "p50 latency: < 100ms"
  - "Error rate: < 0.05%"
  - "RTO: < 1 hour"
  - "RPO: < 15 minutes"

multi_account: true
documentation_required:
  - README.md
  - docs/architecture/solution-architecture.md
  - docs/architecture/capability-map.md
  - docs/risk-register.md
  - docs/arb-submission/
  - docs/compliance/
  - docs/slo-definitions.md
  - CLAUDE.md
